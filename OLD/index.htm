function wmain_open() {
  lb_opr.setControlText("");
  lb_opr.setStyle("display", "none");   
  bt_access.setStyle("display", "block");   
  if (bt_documents.visible==true) {bt_documents.setStyle("display", "block"); }
  if (bt_orders.visible==true)    {bt_orders.setStyle("display", "block"); }
  if (bt_projects.visible==true)  {bt_projects.setStyle("display", "block"); }
  if (bt_reports.visible==true)   {bt_reports.setStyle("display", "block"); }
  if (bt_sale.visible==true)       {bt_sale.setStyle("display", "block"); }
  if (bt_history.visible==true)    {bt_history.setStyle("display", "block"); }
  if (bt_tools.visible==true)      {bt_tools.setStyle("display", "block"); }
  if (bt_directory.visible==true)  {bt_directory.setStyle("display", "block"); }
  return true;    
}
//-----------------------------------------------------------------------------
//                                    
//-----------------------------------------------------------------------------
function wmain_close() {
  lb_opr.setStyle("display", "block");   
  bt_access.setStyle("display", "none") ;    
  bt_documents.setStyle("display", "none") ;    
  bt_orders.setStyle("display", "none") ;    
  bt_projects.setStyle("display", "none") ;    
  bt_reports.setStyle("display", "none") ;    
  bt_sale.setStyle("display", "none") ;    
  bt_history.setStyle("display", "none") ;    
  bt_tools.setStyle("display", "none") ;    
  bt_directory.setStyle("display", "none");
  return true;
